services:
  # ── Backend (Node.js API) ──────────────────────────────────────
  - type: web
    name: medicare-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure random value
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false                  # You fill this in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false                  # You fill this in Render dashboard
      - key: S3_BUCKET_NAME
        sync: false                  # You fill this in Render dashboard
      - key: CLIENT_URL
        fromService:
          name: medicare-frontend
          type: web
          property: host

  # ── Frontend (React Static Site) ──────────────────────────────
  - type: web
    name: medicare-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: medicare-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
