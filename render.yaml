services:
  # ── Backend (Node.js API) ──────────────────────────────────────
  - type: web
    name: medicare-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: CLIENT_URL
        value: https://medicare-frontend.onrender.com

  # ── Frontend (React Static Site) ──────────────────────────────
  - type: web
    name: medicare-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://medicare-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
